<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Users | Show & Go Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background-color: #1f2937; color: white; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 0.75rem; border-bottom: 1px solid #fbbf24; text-align: left; }
  .btn { background-color: #fbbf24; color: black; padding: 0.3rem 0.6rem; border-radius: 0.5rem; font-semibold; }
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- Navbar -->
<nav class="flex justify-between items-center p-6 bg-gray-900/90 border-b border-yellow-500/20 sticky top-0 z-50">
  <h1 class="text-2xl font-bold text-yellow-400">Admin Users</h1>
  <div class="space-x-4">
    <a href="dashboard.html" class="text-yellow-400 hover:text-yellow-300 transition">Dashboard</a>
    <a href="index.html" class="text-yellow-400 hover:text-yellow-300 transition">Go to Site</a>
  </div>
</nav>

<section class="px-8 py-12 flex-grow max-w-6xl mx-auto">
  <h2 class="text-3xl font-bold text-yellow-400 mb-8 text-center">Registered Users</h2>

  <table>
    <thead>
      <tr>
        <th>User ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="usersTable"></tbody>
  </table>
</section>

<script>
// Sample Users
let users = [
  {id: 1, name: 'John D.', email: 'john@example.com', role: 'Customer'},
  {id: 2, name: 'Maria S.', email: 'maria@example.com', role: 'Customer'},
  {id: 3, name: 'Admin', email: 'admin@showgo.com', role: 'Admin'},
];

const usersTable = document.getElementById('usersTable');

function renderUsers() {
  usersTable.innerHTML = '';
  users.forEach((u, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${u.id}</td>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.role}</td>
      <td><button onclick="deleteUser(${i})" class="btn">Delete</button></td>
    `;
    usersTable.appendChild(tr);
  });
}

function deleteUser(index) {
  if(confirm('Delete this user?')) {
    users.splice(index,1);
    renderUsers();
  }
}

// Initial render
renderUsers();
</script>
</body>
</html>
