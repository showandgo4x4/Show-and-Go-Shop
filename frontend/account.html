<!DOCTYPE html>
<html lang="en">
  <link rel="icon" href="assets/images/logo.png" type="image/x-icon">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account - Show & Go Auto Shop</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Poppins', sans-serif; background:#f5f5f5; color:#1f2937; margin:0; padding:0; }
.account-container { display:flex; max-width:1400px; margin:2rem auto; gap:2rem; }
.sidebar { flex:1; background:#ffffff; padding:2rem; border-radius:1rem; min-width:220px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.sidebar button { display:block; width:100%; text-left; padding:0.75rem 1rem; margin-bottom:0.5rem; border:none; background:#f3f4f6; border-radius:0.5rem; cursor:pointer; }
.sidebar button.active { background:#e5e7eb; }
.content { flex:3; background:#ffffff; padding:2rem; border-radius:1rem; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.hidden { display:none; }
.card { background:#f3f4f6; border-radius:1rem; padding:1.5rem; margin-bottom:1rem; }
.stats { display:flex; gap:1rem; margin-bottom:2rem; }
.stats .stat-card { flex:1; background:#fef3c7; padding:1rem; border-radius:1rem; text-align:center; }
.order-details { background:#f9fafb; padding:0.75rem 1rem; margin-top:0.5rem; border-radius:0.5rem; }
input { width: 100%; box-sizing: border-box; }
</style>
</head>

<body>

<nav class="bg-gray-800 px-6 py-4 flex justify-between items-center shadow-md text-white">
  <span class="font-bold text-lg">SHOW & GO AUTO SHOP</span>
  <div class="space-x-4 text-sm">
    <a href="shop.html">Shop</a>
    <a href="account.html">My Account</a>
  </div>
</nav>

<div class="account-container">

  <div class="sidebar">
    <button id="sidebarProfileBtn" class="active">Profile</button>
    <button id="sidebarOrdersBtn">Orders</button>
    <button id="sidebarPaymentsBtn">Payment Methods</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="content">

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <h3 id="totalOrders">0</h3>
        <p>Total Orders</p>
      </div>
      <div class="stat-card">
        <h3 id="pendingOrders">0</h3>
        <p>Pending Orders</p>
      </div>
      <div class="stat-card">
        <h3 id="completedOrders">0</h3>
        <p>Completed Orders</p>
      </div>
    </div>

    <!-- Profile Section -->
    <div id="profileSection">
      <h2 class="text-xl font-bold mb-4">Profile Details</h2>
      <div class="card">
        <p><strong>Username:</strong><br>
          <input type="text" id="profileUsername" placeholder="Username">
        </p>
        <p><strong>Email:</strong><br>
          <input type="email" id="profileEmail" disabled>
        </p>
        <p><strong>Contact:</strong><br>
          <input type="text" id="profileContact" placeholder="Contact">
        </p>
        <p><strong>Address:</strong><br>
          <input type="text" id="profileAddress" placeholder="Address">
        </p>
        <button id="saveProfileBtn" class="mt-3 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
          Save Profile
        </button>
      </div>
    </div>

    <!-- Orders Section -->
    <div id="ordersSection" class="hidden">
      <h2 class="text-xl font-bold mb-4">My Orders</h2>
      <div id="ordersList"></div>
    </div>

    <!-- Payments Section -->
    <div id="paymentsSection" class="hidden">
      <h2 class="text-xl font-bold mb-4">Payment Methods</h2>
      <div id="paymentList"></div>
      <button id="addPaymentBtn" class="mt-4 bg-yellow-500 px-4 py-2 rounded">
        Add Payment Method
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

  const SUPABASE_URL = "https://jimjbjtlekdytvnpyykw.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppbWpianRsZWtkeXR2bnB5eWt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDM3NzQsImV4cCI6MjA4ODAxOTc3NH0.SZa7CNAx0SWBNsuDqcnrNYS6iwnOmBJ3tD1mSQETZhE";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Check login session
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    alert("Please login first.");
    window.location.href = "login.html";
    return;
  }

  const userId = session.user.id;

  // Fetch profile safely
  let { data: user } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .maybeSingle();

  if (!user) {
    const { data: newProfile } = await supabaseClient
      .from("profiles")
      .insert({
        id: userId,
        email: session.user.email,
        username: "",
        contact: "",
        address: "",
        payments: []
      })
      .select()
      .maybeSingle();
    user = newProfile;
  }

  // ✅ Safely default payments
  user.payments = user?.payments || [];

  // Sidebar buttons
  const profileSection = document.getElementById("profileSection");
  const ordersSection = document.getElementById("ordersSection");
  const paymentsSection = document.getElementById("paymentsSection");

  function showSection(section) {
    profileSection.classList.add("hidden");
    ordersSection.classList.add("hidden");
    paymentsSection.classList.add("hidden");
    section.classList.remove("hidden");
  }

  document.getElementById("sidebarProfileBtn").onclick = () => showSection(profileSection);
  document.getElementById("sidebarOrdersBtn").onclick = async () => { showSection(ordersSection); await renderOrders(); };
  document.getElementById("sidebarPaymentsBtn").onclick = () => { showSection(paymentsSection); renderPayments(); };

  document.getElementById("logoutBtn").onclick = async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
  };

  // Profile display
  document.getElementById("profileUsername").value = user.username || "";
  document.getElementById("profileEmail").value = user.email || "";
  document.getElementById("profileContact").value = user.contact || "";
  document.getElementById("profileAddress").value = user.address || "";

  // Save Profile
  document.getElementById("saveProfileBtn").onclick = async () => {
    const updatedUsername = document.getElementById("profileUsername").value.trim();
    const updatedContact = document.getElementById("profileContact").value.trim();
    const updatedAddress = document.getElementById("profileAddress").value.trim();

    const { error } = await supabaseClient
      .from("profiles")
      .update({ username: updatedUsername, contact: updatedContact, address: updatedAddress })
      .eq("id", userId);

    if(error){ alert("Failed to update profile: " + error.message); return; }
    alert("Profile updated successfully!");
  };

  // Orders & Stats
  async function fetchOrders() {
    const { data: orders } = await supabaseClient
      .from("orders")
      .select("*")
      .eq("user_id", userId)
      .order("created_at", { ascending: false });
    return orders || [];
  }

  async function renderOrders() {
    const ordersList = document.getElementById("ordersList");
    ordersList.innerHTML = "";

    const orders = await fetchOrders();

    document.getElementById("totalOrders").textContent = orders.length;
    document.getElementById("pendingOrders").textContent = orders.filter(o => o.status==="pending").length;
    document.getElementById("completedOrders").textContent = orders.filter(o => o.status==="completed").length;

    if(orders.length===0){ ordersList.innerHTML = "<p>No orders found.</p>"; return; }

    orders.forEach(order => {
      const div = document.createElement("div");
      div.className = "order-details";
      div.innerHTML = `
        <p><strong>Order ID:</strong> ${order.id}</p>
        <p><strong>Status:</strong> ${order.status}</p>
        <p><strong>Created:</strong> ${new Date(order.created_at).toLocaleString()}</p>
        <p><strong>Details:</strong> ${order.details || "-"}</p>
      `;
      ordersList.appendChild(div);
    });
  }

  // Payments
  async function savePayments() {
    await supabaseClient.from("profiles").update({ payments: user.payments }).eq("id", userId);
  }

  function renderPayments() {
    const paymentList = document.getElementById("paymentList");
    paymentList.innerHTML = "";

    if(user.payments.length===0){ paymentList.innerHTML="<p>No payment methods saved.</p>"; return; }

    user.payments.forEach((p,i) => {
      const div = document.createElement("div");
      div.className="card flex justify-between items-center";
      div.innerHTML = `<span><strong>${p.type}</strong> - ${p.details}</span>
        <button onclick="alert('Edit coming soon')" class="bg-gray-300 px-2 py-1 rounded">Edit</button>`;
      paymentList.appendChild(div);
    });
  }

  document.getElementById("addPaymentBtn").onclick = async () => {
    const type = prompt("Enter payment type:"); if(!type) return;
    const details = prompt("Enter details:"); if(!details) return;
    user.payments.push({ type, details });
    await savePayments(); renderPayments();
  };

  // Initial orders render
  await renderOrders();

});
</script>

</body>
</html>
