<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt - Show and Go Auto Shop</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg,#e0f7fa,#fff9c4); color: #1f2937; padding:2rem; }
.card { background:#fff; border-radius:1rem; box-shadow:0 15px 30px rgba(0,0,0,0.08); padding:2rem; max-width:700px; margin:auto; }
.btn-primary { background: linear-gradient(90deg,#10b981,#059669); color:#fff; font-weight:600; border-radius:0.75rem; padding:0.75rem 1.5rem; transition: all 0.2s; cursor:pointer; }
.btn-primary:hover { opacity:0.9; transform:scale(1.03); }
.btn-secondary { background:#e5e7eb; color:#1f2937; font-weight:600; border-radius:0.75rem; padding:0.75rem 1.5rem; cursor:pointer; }
.btn-secondary:hover { background:#d1d5db; transform:scale(1.02); }
</style>
</head>
<body>

<div class="card">
  <h2 class="text-xl font-bold mb-4"><i class="fa fa-receipt mr-2"></i>Order Receipt</h2>
  <div id="receiptContent">
    Loading receipt...
  </div>
  <button id="downloadPdf" class="btn-primary mt-4">Download PDF</button>
  <a href="index.html" class="btn-secondary mt-4 inline-block">Back to Home</a>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(async () => {
  // ---------------- Supabase Initialization ----------------
  const SUPABASE_URL = "https://jimjbjtlekdytvnpyykw.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppbWpianRsZWtkeXR2bnB5eWt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDM3NzQsImV4cCI6MjA4ODAxOTc3NH0.SZa7CNAx0SWBNsuDqcnrNYS6iwnOmBJ3tD1mSQETZhE"; // use your anon key here
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ---------------- Get PayPal ID from URL ----------------
  const urlParams = new URLSearchParams(window.location.search);
const orderID = urlParams.get("orderID"); // this is PayPal ID

const { data: order, error } = await supabase
  .from("orders")
  .select("*")
  .eq("paypal_id", orderID)
  .maybeSingle();

if(error || !order) {
  console.error("Order not found:", error);
  alert("Order not found. Please check your payment.");
} else {
  console.log("Order found:", order);
  // Render receipt
}

  // ---------------- Render Receipt ----------------
  const receiptDiv = document.getElementById("receiptContent");
  let html = `<p><strong>Order ID:</strong> ${order.paypal_id}</p>`;
  html += `<p><strong>Status:</strong> ${order.status}</p>`;
  html += `<p><strong>Total:</strong> ₱${order.total.toFixed(2)}</p>`;
  html += `<h3 class="mt-4 font-bold">Shipping Info</h3>`;
  html += `<p>Name: ${order.shipping.name}</p>`;
  html += `<p>Email: ${order.shipping.email}</p>`;
  html += `<p>Address: ${order.shipping.address}</p>`;
  html += `<p>Contact: ${order.shipping.contact}</p>`;
  if (order.shipping.notes) html += `<p>Notes: ${order.shipping.notes}</p>`;
  html += `<h3 class="mt-4 font-bold">Cart Items</h3>`;
  order.cart.forEach(item => {
    html += `<p>${item.product.name} x ${item.quantity} = ₱${(item.product.price*item.quantity).toFixed(2)}</p>`;
  });
  receiptDiv.innerHTML = html;

  // ---------------- PDF Download ----------------
  document.getElementById("downloadPdf").addEventListener("click", () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(12);
    doc.text(receiptDiv.innerText, 10, 10);
    doc.save(`Receipt_${order.paypal_id}.pdf`);
  });

})();
</script>

</body>
</html>
