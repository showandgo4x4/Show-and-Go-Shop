<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Show & Go Admin - Manage Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: #1f2937; color: #f9fafb; }
input, select, textarea { background: #374151; color: #f9fafb; border: 1px solid #fbbf24; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #f59e0b; }
button { cursor: pointer; }
.btn { background: #fbbf24; color: #000; padding: 0.5rem 1rem; border-radius: 0.5rem; font-semibold; transition: 0.3s; }
.btn:hover { background: #fcd34d; }
.btn-delete { background: #dc2626; color: #fff; }
.btn-delete:hover { background: #ef4444; }
.product-card img { max-height: 150px; object-fit: cover; border-radius: 0.5rem; }
</style>
</head>
<body class="p-8">

<h1 class="text-3xl font-bold text-yellow-400 mb-6">Manage Products</h1>

<!-- PRODUCT FORM -->
<section class="mb-10">
  <h2 class="text-xl font-semibold mb-4">Add / Edit Product</h2>
  <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <input type="text" placeholder="Item Name" id="name" required>
    <input type="text" placeholder="Brand" id="brand" required>
    <input type="number" placeholder="Price" id="price" required>
    <input type="number" placeholder="Quantity" id="quantity" required>
    <select id="category" required>
      <option value="">Select Category</option>
      <option value="Engine">Engine</option>
      <option value="Wheels">Wheels</option>
      <option value="Brakes">Brakes</option>
      <option value="Accessories">Accessories</option>
    </select>
    <input type="file" id="image" accept="image/*">
    <textarea placeholder="Description" id="description" rows="3"></textarea>
    <div class="col-span-full flex gap-4">
      <button type="submit" id="submitBtn" class="btn">Add Product</button>
      <button type="button" id="cancelEdit" class="btn btn-delete hidden">Cancel Edit</button>
    </div>
  </form>
</section>

<!-- CATEGORY FILTER -->
<section class="mb-6">
  <label class="font-semibold mb-2 block">Filter by Category:</label>
  <select id="filterCategory" class="px-4 py-2 rounded-lg">
    <option value="All">All</option>
    <option value="Engine">Engine</option>
    <option value="Wheels">Wheels</option>
    <option value="Brakes">Brakes</option>
    <option value="Accessories">Accessories</option>
  </select>
</section>

<!-- PRODUCT LIST -->
<section>
  <h2 class="text-xl font-semibold mb-4">Product List</h2>
  <div id="productList" class="grid md:grid-cols-3 gap-6">
    <!-- Products will render here -->
  </div>
</section>
<script>
const STORAGE_KEY = "sg_products";
let products = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let editIndex = null;

// Sample product if none exist
if (!products.length) {
  products.push({
    name: "Sample Engine Oil",
    brand: "PremiumBrand",
    price: 1200,
    quantity: 10,
    category: "Engine",
    description: "High-quality engine oil for peak performance.",
    image: "assets/products/motoroil.jpg"
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
}

// DOM Elements
const productForm = document.getElementById('productForm');
const productList = document.getElementById('productList');
const submitBtn = document.getElementById('submitBtn');
const cancelEdit = document.getElementById('cancelEdit');
const filterCategory = document.getElementById('filterCategory');

// Render Products
function renderProducts() {
  productList.innerHTML = '';
  const category = filterCategory.value || 'All';
  const filtered = products.filter(p => category === 'All' || p.category === category);

  if (!filtered.length) {
    productList.innerHTML = `<p class="col-span-full text-center text-gray-400">No products available.</p>`;
    return;
  }

  filtered.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card bg-gray-700 p-4 rounded-2xl shadow-lg flex flex-col items-center';
    card.innerHTML = `
      <img src="${p.image}" alt="${p.name}" class="mb-2 w-full">
      <h3 class="text-yellow-400 font-semibold mb-1">${p.name}</h3>
      <p class="text-gray-200 mb-1">Brand: ${p.brand}</p>
      <p class="text-gray-200 mb-1">₱${p.price}</p>
      <p class="text-gray-200 mb-1">Qty: ${p.quantity}</p>
      <p class="text-gray-300 mb-2">${p.category}</p>
      <p class="text-gray-200 mb-4">${p.description}</p>
      <div class="flex gap-2">
        <button onclick="editProduct(${i})" class="btn">Edit</button>
        <button onclick="deleteProduct(${i})" class="btn btn-delete">Delete</button>
      </div>
    `;
    productList.appendChild(card);
  });
}

// Add / Edit Product
productForm.addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const brand = document.getElementById('brand').value.trim();
  const price = parseFloat(document.getElementById('price').value);
  const quantity = parseInt(document.getElementById('quantity').value);
  const category = document.getElementById('category').value;
  const description = document.getElementById('description').value.trim();
  const imageInput = document.getElementById('image');
  let image = '';

  if (imageInput.files && imageInput.files[0]) {
    image = URL.createObjectURL(imageInput.files[0]);
  }

  if (editIndex !== null) {
    // Editing existing
    const p = products[editIndex];
    p.name = name;
    p.brand = brand;
    p.price = price;
    p.quantity = quantity;
    p.category = category;
    p.description = description;
    if (image) p.image = image;
    editIndex = null;
    submitBtn.textContent = "Add Product";
    cancelEdit.classList.add('hidden');
  } else {
    // Adding new
    products.push({ name, brand, price, quantity, category, description, image });
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
  productForm.reset();
  renderProducts();
});

// Edit Product
function editProduct(index) {
  const p = products[index];
  document.getElementById('name').value = p.name;
  document.getElementById('brand').value = p.brand;
  document.getElementById('price').value = p.price;
  document.getElementById('quantity').value = p.quantity;
  document.getElementById('category').value = p.category;
  document.getElementById('description').value = p.description;
  submitBtn.textContent = "Update Product";
  cancelEdit.classList.remove('hidden');
  editIndex = index;
}

// Cancel Edit
cancelEdit.addEventListener('click', () => {
  productForm.reset();
  editIndex = null;
  submitBtn.textContent = "Add Product";
  cancelEdit.classList.add('hidden');
});

// Delete Product
function deleteProduct(index) {
  if (confirm("Are you sure you want to delete this product?")) {
    products.splice(index, 1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    renderProducts();
  }
}

// Filter Change
filterCategory.addEventListener('change', renderProducts);

// Initial render
renderProducts();
</script>
</body>
</html>
